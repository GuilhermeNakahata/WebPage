title: "Guilherme Nakahata"
baseURL: "https://guilhermenakahata.github.io/WebPage/"
languageCode: "pt-br"
titleCaseStyle: "none"
theme: "neopost"
defaultContentLanguage: en
relativeURLs: true
canonifyURLs: true

languages:
  en:
    languageCode: en-us
    contentDir: content/en
    languageName: English
    weight: 0
    params:
      sidebar:
        tags:
          enable: true
          limit: 2
          more-text: "more tags..."
      read-more:
        length-limit: 5000
        text:
          more: "read more"
          less: "read less"

params:
  theme: "meow"
  favicon: "/favicon.ico"
  posts-per-page: 1
  toc-auto-numbering: false
